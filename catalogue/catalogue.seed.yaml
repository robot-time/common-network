  - id: cgla-legal
    display_name: CGLA-Legal
    source: "api:cgla-legal"
    domain_tags: [legal, south-australia-law]
    capability_text: >
      CGLA-Legal: neurosymbolic South Australian law reasoning across 14
      domains (residential tenancy, unfair dismissal, family violence,
      consumer protection, debt hardship, and others). Structurally
      cannot hallucinate. Grounded legal reasoning only — not a general
      chat model, will not answer outside SA law.
    params_b: null
    min_ram_gb: 0
    min_vram_gb: 0
    needs_gpu: false
    verified_in_lane: true
    lane_benchmark:
      benchmark: "22 SA-law scenarios (internal CGLA evaluation, pre-v0.2)"
      score: "100%"
      vs_frontier: "31.8%"
      date: null
      note: >
        This number comes from CGLA's own prior evaluation, not yet
        independently reproduced by the v0.2 harness -- that reproduction
        is blocked on the CGLA adapter and dataset (see bench/data/README.md).
        Treat as provisional until bench/ confirms it directly.
    licence: null
