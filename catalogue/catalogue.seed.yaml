# Common Network specialist catalogue.
#
# This is a commons asset — PRs welcome. Add real, runnable models only.
# `verified_in_lane: true` is earned by the v0.2 benchmark harness
# (bench/) actually measuring a model beating a frontier model in its
# domain — never set it because a model "should" be good. See
# `lane_benchmark` for the measurement that earned it, and its `date`.
#
# min_ram_gb / min_vram_gb / needs_gpu gate what common-join will ever
# recommend for a given machine — leave real headroom, a specialist that
# swaps and times out is worse than a generalist that answers.

models:
  - id: qwen2.5-coder-7b
    display_name: Qwen2.5 Coder 7B
    source: "ollama:qwen2.5-coder:7b"
    domain_tags: [code, python, programming]
    capability_text: >
      Qwen2.5 Coder 7B. Strong at code generation, debugging, and
      structured reasoning across common languages. Runs comfortably on a
      consumer laptop.
    params_b: 7.6
    min_ram_gb: 8
    min_vram_gb: 0
    needs_gpu: false
    verified_in_lane: false
    lane_benchmark: null
    licence: apache-2.0

